<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interaktivt CSS-labb för responsiva gridmönster.">
    <title>Lab - CSS Tips</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="page-header">
      <nav class="topbar" aria-label="Huvudnavigering">
        <a class="brand" href="index.html" aria-label="CSS Tips startsida">
          <span class="brand-mark">CSS</span>
          <span>Tips</span>
        </a>
        <div class="topbar-links">
          <a href="tips.html">Alla tips</a>
          <a href="progression.html">Progression</a>
          <a href="lab.html" aria-current="page">Lab</a>
          <a href="https://github.com/j4rl/css-tips" rel="noreferrer">Källa</a>
        </div>
        <div class="theme-switcher" aria-label="Välj tema">
          <button type="button" data-theme-choice="auto">Auto</button>
          <button type="button" data-theme-choice="light">Ljust</button>
          <button type="button" data-theme-choice="dark">Mörkt</button>
        </div>
      </nav>
      <div class="page-title">
        <p class="eyebrow">Lab</p>
        <h1>Responsivt grid</h1>
        <p>Justera kolumnbredd och mellanrum för att se hur auto-fit och minmax bygger ett flexibelt kortgrid.</p>
      </div>
    </header>

    <main>
      <section class="lab" aria-labelledby="lab-title">
        <div class="section-heading">
          <p class="eyebrow">Interaktivt exempel</p>
          <h2 id="lab-title">Se ett mönster i arbete</h2>
        </div>
        <div class="lab-layout">
          <div class="lab-controls" aria-label="Exempelkontroller">
            <label>
              Kolumnbredd
              <input id="column-size" type="range" min="10" max="22" value="14">
            </label>
            <label>
              Mellanrum
              <input id="gap-size" type="range" min="8" max="32" value="16">
            </label>
          </div>
          <div class="lab-preview" id="lab-preview" aria-label="Responsivt gridexempel">
            <span>auto-fit</span>
            <span>minmax()</span>
            <span>gap</span>
            <span>fluid</span>
          </div>
          <pre class="lab-code"><code id="lab-code"></code></pre>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p><a href="tips.html">Hitta fler layouttips</a></p>
    </footer>

    <script src="data/tips-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
